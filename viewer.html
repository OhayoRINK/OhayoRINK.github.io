<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>README Viewer</title><link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css'><link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css'><style>body{background:#0d1117;margin:0;padding:40px;color:white;font-family:sans-serif}.markdown-body{max-width:1000px;margin:0 auto;background:#161b22;padding:45px;border-radius:18px;border:1px solid rgba(255,255,255,0.08)}</style></head><body><article class='markdown-body' id='content'>Loading README...</article><script src='https://cdn.jsdelivr.net/npm/marked/marked.min.js'></script><script src='https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js'></script><script>const params=new URLSearchParams(window.location.search);const file=params.get('file');fetch(file).then(response=>response.text()).then(markdown=>{document.getElementById('content').innerHTML=marked.parse(markdown);document.querySelectorAll('pre code').forEach((el)=>{hljs.highlightElement(el);});}).catch(err=>{document.getElementById('content').innerHTML=`<h2>Failed to load README</h2><p>${err}</p>`;});</script></body></html>
