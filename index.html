<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>홀로라이브 챌린지</title>
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #13132b;
      --accent: #7b5ea7;
      --gold: #ffd700;
      --text: #eee;
      --gen0: #ffd700;
      --gen1: #ff6b9d;
      --gamers: #5dcc6a;
      --gen2: #66ccff;
      --gen3: #cc99ff;
      --gen4: #ffaa44;
      --gen5: #87ceeb;
      --gen6: #ff6b9d;
      --regloss: #4dd9ff;
      --flowglow: #ffaa33;
      
      /* EN 테마 컬러 */
      --en_myth: #a0a0d0;
      --en_promise: #f0e68c;
      --en_advent: #9370db;
      --en_justice: #ff7f50;

      /* ID 테마 컬러 */
      --id_gen1: #ff4d4d;
      --id_gen2: #4da6ff;
      --id_gen3: #4dff4d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 40px;
    }

    header {
      width: 100%;
      max-width: 520px;
      text-align: center;
      padding: 24px 16px 10px;
    }

    header h1 {
      font-size: 1.6rem;
      color: #d4a0ff;
      text-shadow: 0 0 20px #a05fff99;
      letter-spacing: 2px;
    }

    header p {
      font-size: 0.8rem;
      color: #666;
      margin-top: 4px;
    }

    .record-bar {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 8px 16px;
      background: var(--panel);
      border-radius: 10px;
      margin: 0 16px 18px;
      width: 100%;
      max-width: 520px;
    }

    .rec { text-align: center; }
    .rec .v { font-size: 1.1rem; font-weight: 700; color: #d4a0ff; }
    .rec .l { font-size: 0.65rem; color: #666; margin-top: 1px; }

    .btn-area {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    button {
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      transition: filter 0.15s, transform 0.1s;
    }

    button:hover { filter: brightness(1.2); }
    button:active { transform: scale(0.96); }

    .btn-challenge {
      background: linear-gradient(135deg, #8a4aee, #d090ff);
      color: #fff;
      font-size: 1.1rem;
      padding: 13px 36px;
      box-shadow: 0 4px 20px #8a4aee66;
    }

    .btn-reset {
      background: #1e1e38;
      color: #777;
      font-size: 0.85rem;
      padding: 13px 20px;
    }

    .btn-challenge:disabled { filter: grayscale(0.6); cursor: not-allowed; }

    #cards {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      min-height: 160px;
      margin: 0 12px 20px;
      width: 100%;
      max-width: 520px;
    }

    .card {
      width: 88px;
      border-radius: 12px;
      overflow: hidden;
      text-align: center;
      background: var(--panel);
      border: 2px solid #2a2a4a;
      animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes popIn {
      from { transform: scale(0.3) rotate(-15deg); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .card .c-rar {
      font-size: 0.55rem;
      font-weight: 700;
      padding: 4px 0 0;
      letter-spacing: 1px;
    }

    .card .c-icon {
      font-size: 2.4rem;
      padding: 6px 0 2px;
      display: block;
    }

    .card .c-name {
      font-size: 0.58rem;
      padding: 2px 4px 8px;
      line-height: 1.3;
      color: #ccc;
      word-break: keep-all;
    }

    .c-grad {
      font-size: 0.48rem;
      color: #888;
      background: #222;
      border-radius: 3px;
      padding: 1px 4px;
      margin: 0 4px 2px;
      display: inline-block;
      letter-spacing: 0.5px;
    }

    .card.graduated { opacity: 0.75; filter: saturate(0.5); }

    /* 기수별 카드 색상 */
    .card.gen0 { border-color: #ffd700; background: #1e1400; box-shadow: 0 0 14px #ffd70055; }
    .card.gen0 .c-rar { color: var(--gen0); }
    .card.gen1 { border-color: #ff6b9d; }
    .card.gen1 .c-rar { color: var(--gen1); }
    .card.gamers { border-color: #5dcc6a; background: #0d1a0d; }
    .card.gamers .c-rar { color: var(--gamers); }
    .card.gen2 { border-color: #3a6a8a; }
    .card.gen2 .c-rar { color: var(--gen2); }
    .card.gen3 { border-color: #7a3aaa; background: #180d2a; }
    .card.gen3 .c-rar { color: var(--gen3); }
    .card.gen4 { border-color: #cc7722; }
    .card.gen4 .c-rar { color: var(--gen4); }
    .card.gen5 { border-color: #4488aa; }
    .card.gen5 .c-rar { color: var(--gen5); }
    .card.gen6 { border-color: #cc3366; background: #1a0010; box-shadow: 0 0 14px #cc336655; }
    .card.gen6 .c-rar { color: #ff80aa; }
    .card.regloss { border-color: #4dd9ff; background: #001a22; box-shadow: 0 0 14px #4dd9ff44; }
    .card.regloss .c-rar { color: var(--regloss); }
    .card.flowglow { border-color: #ffaa33; background: #1e1200; box-shadow: 0 0 14px #ffaa3344; }
    .card.flowglow .c-rar { color: var(--flowglow); }

    .card.en_myth { border-color: var(--en_myth); background: #151525; box-shadow: 0 0 14px #a0a0d044; }
    .card.en_myth .c-rar { color: var(--en_myth); }
    .card.en_promise { border-color: var(--en_promise); background: #202010; box-shadow: 0 0 14px #f0e68c44; }
    .card.en_promise .c-rar { color: var(--en_promise); }
    .card.en_advent { border-color: var(--en_advent); background: #1a0a2a; box-shadow: 0 0 14px #9370db44; }
    .card.en_advent .c-rar { color: var(--en_advent); }
    .card.en_justice { border-color: var(--en_justice); background: #2a1005; box-shadow: 0 0 14px #ff7f5044; }
    .card.en_justice .c-rar { color: var(--en_justice); }

    .card.id_gen1 { border-color: var(--id_gen1); background: #1a0505; box-shadow: 0 0 14px #ff4d4d44; }
    .card.id_gen1 .c-rar { color: var(--id_gen1); }
    .card.id_gen2 { border-color: var(--id_gen2); background: #05101a; box-shadow: 0 0 14px #4da6ff44; }
    .card.id_gen2 .c-rar { color: var(--id_gen2); }
    .card.id_gen3 { border-color: var(--id_gen3); background: #051a05; box-shadow: 0 0 14px #4dff4d44; }
    .card.id_gen3 .c-rar { color: var(--id_gen3); }

    #result-panel {
      width: 100%;
      max-width: 520px;
      margin: 0 12px 20px;
      display: none;
    }

    .score-box {
      background: var(--panel);
      border-radius: 12px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .score-box .s-left .s-label { font-size: 0.75rem; color: #888; }
    .score-box .s-left .s-val { font-size: 2rem; font-weight: 700; color: var(--gold); }
    .score-box .s-right { font-size: 0.8rem; color: #666; text-align: right; line-height: 1.6; }

    .syn-achieved { margin-bottom: 6px; }
    .syn-achieved-title { font-size: 0.72rem; color: #888; margin-bottom: 6px; padding-left: 2px; }
    
    .syn-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #2a1545, #0d2040);
      border: 1px solid #6a4a9a;
      border-radius: 8px;
      padding: 6px 12px;
      margin: 3px;
      font-size: 0.8rem;
      animation: fadeIn 0.4s ease both;
    }

    /* 티어별 칩 효과 추가 */
    .syn-chip.gold { border-color: var(--gold); box-shadow: 0 0 8px #ffd70033; }
    .syn-chip.region { border-color: #4dd9ff; background: linear-gradient(135deg, #0d2b40, #15456b); }
    
    .syn-chip.platinum {
      border-color: #e5e4e2;
      background: linear-gradient(135deg, #222, #444);
      box-shadow: 0 0 8px #e5e4e266;
      color: #fff;
    }
    
    .syn-chip.diamond {
      border-color: #00ffff;
      background: linear-gradient(135deg, #002244, #005577);
      box-shadow: 0 0 10px #00ffff88;
      color: #ccffff;
    }

    /* 🔥 잭팟 이펙트 (기수 완성 & 5인 유닛 전용) 🔥 */
    .syn-chip.jackpot { 
      background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
      background-size: 400% 400%;
      animation: rainbowGlow 2.5s linear infinite, popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      border: 2px solid #fff;
      color: #fff;
      font-weight: 900;
      box-shadow: 0 0 15px #ffffffaa, inset 0 0 10px #ffffffaa;
      text-shadow: 0 0 5px #000;
      transform: scale(1.05);
    }
    @keyframes rainbowGlow {
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }

    /* 히든 시너지 이펙트 */
    .syn-chip.hidden { border-color: #ffffff; background: linear-gradient(135deg, #222, #555); box-shadow: 0 0 12px #ffffffaa; color: #fff; }
    
    .syn-chip .sc-pts { color: var(--gold); font-weight: 700; margin-left: 4px; }
    .syn-chip.hidden .sc-pts { color: #fff; text-shadow: 0 0 4px #fff; }
    .syn-chip.platinum .sc-pts { color: #e5e4e2; }
    .syn-chip.diamond .sc-pts { color: #00ffff; }
    .syn-chip.jackpot .sc-pts { color: #ffd700; text-shadow: 0 0 5px #000; }
    
    .syn-chip .sc-members { font-size: 0.75rem; letter-spacing: 2px; margin-left: 4px; border-left: 1px solid #ffffff44; padding-left: 8px;}

    .no-syn { font-size: 0.8rem; color: #555; padding: 10px 2px; font-style: italic; }

    #syn-table-section { width: 100%; max-width: 520px; margin: 0 12px; }
    
    .toggle-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #1e1e38;
      color: #eee;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: bold;
      cursor: pointer;
      margin: 0 auto 12px;
      width: 100%;
      border: 1px solid #2a2a4a;
      transition: all 0.2s;
      user-select: none;
    }
    .toggle-btn:hover { background: #2a2a4a; border-color: #4a4a6a; }
    .toggle-icon { font-size: 0.7rem; transition: transform 0.2s; }
    .toggle-icon.closed { transform: rotate(-90deg); }
    
    #syn-table {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .syn-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--panel);
      border-radius: 8px;
      padding: 7px 10px;
      margin-bottom: 4px;
      border: 1px solid #1e1e38;
    }

    .syn-row .sr-name { flex: 1; font-size: 0.78rem; font-weight: 600; color: #c9a0ff; }
    .syn-row .sr-members { font-size: 0.65rem; color: #666; flex: 2; }
    .syn-row .sr-pts { font-size: 0.78rem; color: var(--gold); min-width: 50px; text-align: right; }
    .syn-row .sr-cnt { font-size: 0.65rem; color: #555; min-width: 30px; text-align: center; }
    .group-label { font-size: 0.68rem; color: #444; margin: 10px 0 4px; padding-left: 2px; }
  </style>
</head>
<body>

  <header>
    <h1>홀로라이브 챌린지</h1>
    <p>랜덤 뽑기로 도전하는 최고점수!</p>
  </header>

  <div class="record-bar">
    <div class="rec"><div class="v" id="try-count">0</div><div class="l">도전 횟수</div></div>
    <div class="rec"><div class="v" id="best-score">0</div><div class="l">최고 점수</div></div>
    <div class="rec"><div class="v" id="best-syn">-</div><div class="l">최고 시너지</div></div>
  </div>

  <div class="btn-area">
    <button class="btn-challenge" id="btn-challenge" onclick="doChallenge()">도전!</button>
    <button class="btn-reset" onclick="doReset()">초기화</button>
  </div>

  <div id="cards"></div>

  <div id="result-panel">
    <div class="score-box">
      <div class="s-left">
        <div class="s-label">이번 점수</div>
        <div class="s-val" id="cur-score">0</div>
      </div>
      <div class="s-right" id="score-comment"></div>
    </div>
    <div class="syn-achieved">
      <div class="syn-achieved-title">✨ 달성한 시너지</div>
      <div id="syn-chips"></div>
    </div>
  </div>

  <div id="syn-table-section">
    <div class="toggle-btn" onclick="toggleTable()">
      <span id="syn-toggle-text">시너지 일람 열기</span>
      <span class="toggle-icon closed" id="syn-toggle-icon">▼</span>
    </div>
    <div id="syn-table"></div>
  </div>

      { id: "syn_FAMS", name: "FAMS 🦊👹🐺🦆", type: "unit", req_members: ["fubuki", "ayame", "mio", "subaru"], count: 4, score: 50000 },
      { id: "syn_SubaChocoLunaTan", name: "스바초코루나탄 🦆🍫🌙🦁", type: "unit", req_members: ["subaru", "choco", "luna", "botan"], count: 4, score: 50000 },

      { id: "syn_SNOT", name: "SNOT 🦈🍂🌿🪶", type: "unit", req_members: ["gura", "anya", "fauna", "mumei"], count: 4, score: 50000 },
      { id: "syn_네포라보", name: "네포라보 ❄️🌸🦁🎪", type: "unit", req_members: ["lamy", "nene", "botan", "polka"], count: 4, score: 50000 },

      { id: "syn_시라켄", name: "시라누이 건설 🎪☄️🔥🌸⚔️", type: "unit", req_members: ["flare", "polka", "miko", "suisei", "noel"], count: 5, score: 999999, jackpot: true },
      { id: "syn_Usaken", name: "우사다 건설 🐰🔮😈🦁😇", type: "unit", req_members: ["pekora", "moona", "towa", "botan", "kanata"], count: 5, score: 999999, jackpot: true },
      { id: "syn_Holotori", name: "홀로토리(Holotori) 🦆🐔🪶🦚🦅", type: "unit", req_members: ["subaru", "kiara", "mumei", "reine", "lui"], count: 5, score: 999999, jackpot: true }
    ];

    let tries = 0, bestScore = 0, bestSynName = '-';

    function getRegion(t) {
      const g = t.gens[0];
      if (typeof g === 'string' && g.startsWith('en_')) return 'EN';
      if (typeof g === 'string' && g.startsWith('id_')) return 'ID';
      return 'JP'; 
    }

    function genClass(t) {
      const g = t.gens[0];
      if (typeof g === 'string' && (g.startsWith('en_') || g.startsWith('id_'))) return g;
      if (g === 'gamers') return 'gamers';
      if (g === 'holoX') return 'gen6';
      if (g === 'regloss') return 'regloss';
      if (g === 'flowglow') return 'flowglow';
      return 'gen' + g;
    }

    function genLabel(t) {
      const g = t.gens[0];
      if (g === 'en_myth') return 'Myth';
      if (g === 'en_promise') return 'Promise';
      if (g === 'en_advent') return 'Advent';
      if (g === 'en_justice') return 'Justice';
      if (g === 'id_gen1') return 'ID 1기';
      if (g === 'id_gen2') return 'ID 2기';
      if (g === 'id_gen3') return 'ID 3기';
      if (g === 'gamers') return 'GAMERS';
      if (g === 'holoX') return 'holoX';
      if (g === 'regloss') return 'ReGLOSS';
      if (g === 'flowglow') return 'FLOWGLOW';
      return g + '기생';
    }

    function pickTalent(exclude) {
      const pool = TALENTS.filter(t => !exclude.has(t.id));
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function calcSynergies(drawn) {
      const achieved = [];
      let total = 0;
      
      const genMatchMap = {};

      let jpCount = 0, enCount = 0, idCount = 0;
      const jpMembers = [], enMembers = [], idMembers = [];
      
      drawn.forEach(t => {
        const r = getRegion(t);
        if (r === 'JP') { jpCount++; jpMembers.push(t); }
        else if (r === 'EN') { enCount++; enMembers.push(t); }
        else if (r === 'ID') { idCount++; idMembers.push(t); }
      });

      // === 시너지 리스트 순회 ===
      for (const syn of SYNERGIES) {
        if (syn.type === 'region') {
          if (syn.required_region === 'JP' && jpCount >= syn.count) { 
            achieved.push({ syn, members: jpMembers }); total += syn.score; 
          }
          else if (syn.required_region === 'EN' && enCount >= syn.count) { 
            achieved.push({ syn, members: enMembers }); total += syn.score; 
          }
          else if (syn.required_region === 'ID' && idCount >= syn.count) { 
            achieved.push({ syn, members: idMembers }); total += syn.score; 
          }
        } else if (syn.type === 'gen') {
          const matchedMembers = drawn.filter(t => t.gens.includes(syn.required_gen));
          if (matchedMembers.length >= syn.count) {
            if (!genMatchMap[syn.required_gen] || genMatchMap[syn.required_gen].syn.count < syn.count) {
              genMatchMap[syn.required_gen] = { syn, members: matchedMembers };
            }
          }
        } else if (syn.type === 'unit') {
          const matchedMembers = drawn.filter(t => syn.req_members.includes(t.id));
          if (matchedMembers.length >= syn.count) {
            achieved.push({ syn, members: matchedMembers });
            total += syn.score;
          }
        }
      }
      
      // 기수 시너지 합산
      for (const key in genMatchMap) {
        achieved.push(genMatchMap[key]);
        total += genMatchMap[key].syn.score;
      }

      // === 히든 시너지 로직 추가 (졸업자 5명) ===
      const gradMembers = drawn.filter(t => t.graduated);
      if (gradMembers.length >= 4) {
        achieved.push({
          syn: { id: "syn_hidden_grad", name: "영원한 기억 ✨", type: "hidden", count: 4, score: 10000 },
          members: gradMembers
        });
        total += 5000;
      }
      
      return { achieved, total };
    }

    function doChallenge() {
      const btn = document.getElementById('btn-challenge');
      btn.disabled = true;

      const exclude = new Set();
      const drawn = [];
      
      for (let i = 0; i < 5; i++) {
        const t = pickTalent(exclude);
        exclude.add(t.id);
        drawn.push(t);
      }

      const { achieved, total } = calcSynergies(drawn);
      tries++;
      
      if (total > bestScore) {
        bestScore = total;
        bestSynName = achieved.length ? achieved.sort((a, b) => b.syn.score - a.syn.score)[0].syn.name : '없음';
      }

      const cardsEl = document.getElementById('cards');
      cardsEl.innerHTML = '';
      
      drawn.forEach((t, i) => {
        const d = document.createElement('div');
        const gradClass = t.graduated ? ' graduated' : '';
        d.className = `card ${genClass(t)}${gradClass}`;
        d.style.animationDelay = `${i * 80}ms`;
        const gradBadge = t.graduated ? `<div class="c-grad">졸업</div>` : '';
        d.innerHTML = `
          <div class="c-rar">${genLabel(t)}</div>
          <span class="c-icon">${t.icon}</span>
          <div class="c-name">${t.name_kr}</div>
          ${gradBadge}
        `;
        cardsEl.appendChild(d);
      });

      document.getElementById('result-panel').style.display = 'block';
      document.getElementById('cur-score').textContent = total.toLocaleString();

      const comments = [
        [0, '시너지 없음... 다시 도전!'],
        [500, '소소한 인연 발견! 🌱'],
        [1500, '오, 좋은 조합! ⭐'],
        [5000, '놀라운 시너지! 🌟'],
        [30000, '대박!! 전설의 조합!! 💫'],
        [100000, '🔥🔥 기적의 잭팟 달성!!! 🔥🔥']
      ];
      const msg = comments.slice().reverse().find(([min]) => total >= min)[1];
      
      document.getElementById('score-comment').innerHTML = `
        <span>${msg}</span><br>
        <span style="color:#555">최고: ${bestScore.toLocaleString()}</span>
      `;

      const chipsEl = document.getElementById('syn-chips');
      if (!achieved.length) {
        chipsEl.innerHTML = '<div class="no-syn">아쉽게도 이번엔 시너지가 없었어요.</div>';
      } else {
        chipsEl.innerHTML = achieved
          .sort((a, b) => b.syn.score - a.syn.score)
          .map((item, i) => {
            const s = item.syn;
            const m = item.members;
            
            // 칩 색상 및 스타일 결정
            let chipClass = '';
            if (s.jackpot) chipClass = 'jackpot';
            else if (s.type === 'region') chipClass = 'region';
            else if (s.type === 'hidden') chipClass = 'hidden'; 
            else if (s.score >= 30000) chipClass = 'diamond';
            else if (s.score >= 1500) chipClass = 'platinum';
            else if (s.score >= 700) chipClass = 'gold';

            // 발동시킨 멤버들의 이모지 렌더링
            const memberIcons = m.map(t => t.icon).join(''); 

            return `
              <span class="syn-chip ${chipClass}" style="animation-delay:${i * 60}ms">
                ${s.name} <span class="sc-pts">+${s.score.toLocaleString()}</span>
                <span class="sc-members">${memberIcons}</span>
              </span>
            `;
          }).join('');
      }

      document.getElementById('try-count').textContent = tries;
      document.getElementById('best-score').textContent = bestScore.toLocaleString();
      document.getElementById('best-syn').textContent = bestSynName;

      setTimeout(() => btn.disabled = false, 300);
      renderSynTable(achieved.map(item => item.syn.id));
    }

    function doReset() {
      tries = 0;
      bestScore = 0;
      bestSynName = '-';
      document.getElementById('cards').innerHTML = '';
      document.getElementById('result-panel').style.display = 'none';
      document.getElementById('try-count').textContent = '0';
      document.getElementById('best-score').textContent = '0';
      document.getElementById('best-syn').textContent = '-';
      renderSynTable([]);
    }

    let isTableOpen = false;
    function toggleTable() {
      isTableOpen = !isTableOpen;
      const table = document.getElementById('syn-table');
      const icon = document.getElementById('syn-toggle-icon');
      const text = document.getElementById('syn-toggle-text');

      if (isTableOpen) {
        table.style.display = 'block';
        icon.classList.remove('closed');
        text.textContent = '시너지 일람 닫기';
      } else {
        table.style.display = 'none';
        icon.classList.add('closed');
        text.textContent = '시너지 일람 열기';
      }
    }

    function renderSynTable(achievedIds) {
      const el = document.getElementById('syn-table');
      const regionSyns = SYNERGIES.filter(s => s.type === 'region');
      const unitSyns = SYNERGIES.filter(s => s.type === 'unit');
      const genSyns = SYNERGIES.filter(s => s.type === 'gen');
      
      const devisUnitSyns = unitSyns.filter(s => s.req_members.some(m => ['ao', 'kanade', 'ririka', 'raden', 'hajime', 'riona', 'niko', 'su', 'chihaya', 'vivi'].includes(m)));
      const otherUnitSyns = unitSyns.filter(s => !devisUnitSyns.includes(s));
      
      const jpGenSyns = genSyns.filter(s => typeof s.required_gen === 'number' || s.required_gen === 'gamers' || s.required_gen === 'holoX');
      const devisGenSyns = genSyns.filter(s => s.required_gen === 'regloss' || s.required_gen === 'flowglow');
      const enGenSyns = genSyns.filter(s => typeof s.required_gen === 'string' && s.required_gen.startsWith('en_'));
      const idGenSyns = genSyns.filter(s => typeof s.required_gen === 'string' && s.required_gen.startsWith('id_'));

      const makeRow = (s) => {
        const hit = achievedIds.includes(s.id);
        let members = '';
        
        if (s.type === 'unit') {
          members = s.req_members.map(id => {
            const t = TALENTS.find(x => x.id === id);
            return t ? t.icon + ' ' + t.name_kr : '';
          }).join(' · ');
        } else if (s.type === 'gen') {
          members = TALENTS.filter(t => t.gens.includes(s.required_gen)).map(t => t.icon + ' ' + t.name_kr).join(' · ');
        } else if (s.type === 'region') {
          if (s.required_region === 'JP') members = 'JP (DEV_IS 포함) 멤버 출현 시';
          if (s.required_region === 'EN') members = 'EN 소속 멤버 출현 시';
          if (s.required_region === 'ID') members = 'ID 소속 멤버 출현 시';
        }
          
        return `
          <div class="syn-row" style="${hit ? 'border-color:#ffd70088;background:#1e1400' : ''}">
            <div class="sr-name" style="${s.type === 'region' ? 'color:#4dd9ff;' : ''}">${hit ? '✅ ' : ''}${s.name}</div>
            <div class="sr-members" style="font-size: 0.55rem;">${members}</div>
            <div class="sr-cnt">${s.count}인</div>
            <div class="sr-pts">+${s.score.toLocaleString()}</div>
          </div>
        `;
      };

      el.innerHTML =
        `<div class="group-label">— 국가별 시너지 (Region) —</div>` +
        regionSyns.map(makeRow).join('') +
        `<div class="group-label">— 페어 / 유닛 시너지 —</div>` +
        otherUnitSyns.map(makeRow).join('') +
        devisUnitSyns.map(makeRow).join('') +
        `<div class="group-label">— JP 기수별 시너지 —</div>` +
        jpGenSyns.map(makeRow).join('') +
        `<div class="group-label">— EN 기수별 시너지 —</div>` +
        enGenSyns.map(makeRow).join('') +
        `<div class="group-label">— ID 기수별 시너지 —</div>` +
        idGenSyns.map(makeRow).join('') +
        `<div class="group-label">— DEV_IS 기수별 시너지 —</div>` +
        devisGenSyns.map(makeRow).join('');
    }

    renderSynTable([]);
  </script>
